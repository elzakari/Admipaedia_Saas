[alembic]
script_location = c:\Users\elzak\Downloads\ADMIPAEDIA STANDARD\ADMIPAEDIA Beta\backend\migrations
sqlalchemy.url = 

# Keep paths simple; use the current workspace root
prepend_sys_path = .

# Logging (optional minimal setup)
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)s %(name)s %(message)s