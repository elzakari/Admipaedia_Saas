apiVersion: apps/v1
kind: Deployment
metadata:
  name: admipaedia-frontend
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: admipaedia-frontend
  template:
    metadata:
      labels:
        app: admipaedia-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/your-org/admipaedia/frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admipaedia-backend
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: admipaedia-backend
  template:
    metadata:
      labels:
        app: admipaedia-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/your-org/admipaedia/backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: admipaedia-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: admipaedia-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: admipaedia-secrets
              key: secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: admipaedia-frontend-service
  namespace: production
spec:
  selector:
    app: admipaedia-frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: admipaedia-backend-service
  namespace: production
spec:
  selector:
    app: admipaedia-backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP