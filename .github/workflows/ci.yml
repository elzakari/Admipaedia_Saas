name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Secret scanning (Gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.13.0'
        cache: 'npm'
        cache-dependency-path: package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linting
      run: npm -w frontend run lint
    
    - name: Build
      run: npm -w frontend run build

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: admipaedia_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Wait for Postgres
      run: |
        python - <<'PY'
        import time
        import psycopg2
        for i in range(30):
            try:
                psycopg2.connect('postgresql://postgres:postgres@localhost:5432/admipaedia_test').close()
                print('Postgres is ready')
                break
            except Exception as e:
                print('Waiting for Postgres...', str(e))
                time.sleep(2)
        else:
            raise SystemExit('Postgres did not become ready')
        PY
    
    - name: Run tests
      run: pytest -q tests/test_api/test_settings_segregation.py tests/integration/test_invitation_links.py
      env:
        TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/admipaedia_test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/admipaedia_test
