name: Enhanced CI/CD Pipeline for ADMIPAEDIA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }} # Standardized concurrency group
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'
  POSTGRES_VERSION: '14'

jobs:
  # Security and Code Quality Checks
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Security Scan
        uses: securecodewarrior/github-action-add-sarif@v1
        with:
          sarif-file: 'security-scan-results.sarif'
      
      - name: Dependency Security Audit
        run: |
          cd frontend && npm audit --audit-level high
          cd ../backend && pip-audit

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  # Frontend Build and Test
  frontend-ci:
    runs-on: ubuntu-latest
    needs: security-scan
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci --prefer-offline --no-audit
      
      - name: TypeScript Type Check
        run: |
          cd frontend
          npm run typecheck
      
      - name: ESLint Code Quality
        run: |
          cd frontend
          npm run lint
      
      - name: Run Unit Tests
        run: |
          cd frontend
          npm run test:coverage
      
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
        env:
          CI: true
          GENERATE_SOURCEMAP: false
      
      - name: Bundle Size Analysis
        run: |
          cd frontend
          npm run analyze
      
      - name: Upload Frontend Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7
      
      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v3
        with:
          file: frontend/coverage/lcov.info
          flags: frontend

  # Backend Build and Test
  backend-ci:
    runs-on: ubuntu-latest
    needs: security-scan
    
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: admipaedia_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest-cov pytest-xdist
      
      - name: Code Quality Check (Black, isort, flake8)
        run: |
          cd backend
          black --check .
          isort --check-only .
          flake8 .
      
      - name: Run Database Migrations
        run: |
          cd backend
          flask db upgrade
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/admipaedia_test
          FLASK_ENV: testing
      
      - name: Run Unit Tests
        run: |
          cd backend
          pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=html
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/admipaedia_test
          REDIS_URL: redis://localhost:6379/0
          FLASK_ENV: testing
      
      - name: Run Integration Tests
        run: |
          cd backend
          pytest tests/integration/ -v --maxfail=5
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/admipaedia_test
          REDIS_URL: redis://localhost:6379/0
          FLASK_ENV: testing
      
      - name: Upload Backend Coverage
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          flags: backend

  # End-to-End Testing
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Start Application Stack
        run: |
          docker-compose -f docker-compose.test.yml up -d
          sleep 30  # Wait for services to be ready
      
      - name: Run Cypress E2E Tests
        run: |
          cd frontend
          npm ci
          npm run test:e2e
        env:
          CYPRESS_baseUrl: http://localhost:3000
      
      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots/
      
      - name: Cleanup Test Environment
        if: always()
        run: docker-compose -f docker-compose.test.yml down

  # Performance Testing
  performance-tests:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Lighthouse CI
        run: npm install -g @lhci/cli@0.12.x
      
      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
      
      - name: Run Lighthouse Performance Tests
        run: |
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      
      - name: Load Testing with Artillery
        run: |
          npm install -g artillery
          artillery run performance-tests/load-test.yml

  # Security Testing
  security-tests:
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: OWASP ZAP Security Scan
        uses: zaproxy/action-full-scan@v0.7.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

  # Build and Push Docker Images
  build-images:
    runs-on: ubuntu-latest
    needs: [e2e-tests, performance-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Staging Environment
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_STAGING }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
      
      - name: Run Smoke Tests
        run: |
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1
          curl -f ${{ secrets.STAGING_URL }}/api/health || exit 1
      
      - name: Notify Deployment Status
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Production Environment
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: kubectl apply -f k8s/production/
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
      
      - name: Run Production Health Checks
        run: |
          curl -f ${{ secrets.PRODUCTION_URL }}/health || exit 1
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || exit 1
      
      - name: Update Deployment Status
        run: |
          echo "Production deployment completed successfully"
          echo "Version: ${{ github.sha }}"
          echo "Deployed at: $(date)"
      
      - name: Notify Production Deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#production'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Database Migration Job
  migrate-database:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run Database Migrations
        run: |
          cd backend
          flask db upgrade
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
          FLASK_ENV: production

  # Monitoring and Alerting Setup
  setup-monitoring:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Application Monitoring
        run: |
          echo "Setting up monitoring and alerting..."
          # Add monitoring setup commands here
          # Example: Deploy Prometheus, Grafana configurations
      
      - name: Configure Health Check Endpoints
        run: |
          echo "Configuring health check monitoring..."
          # Add health check monitoring setup
      
      - name: Setup Log Aggregation
        run: |
          echo "Setting up log aggregation..."
          # Add log aggregation setup (ELK stack, etc.)

  # Cleanup and Maintenance
  cleanup:
    runs-on: ubuntu-latest
    needs: [deploy-production, setup-monitoring]
    if: always()
    
    steps:
      - name: Cleanup Old Docker Images
        run: |
          echo "Cleaning up old Docker images..."
          # Add cleanup commands for old images
      
      - name: Archive Build Artifacts
        run: |
          echo "Archiving build artifacts..."
          # Add archival commands
      
      - name: Generate Deployment Report
        run: |
          echo "Generating deployment report..."
          echo "Deployment completed at: $(date)"
          echo "Git SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
