name: production-build-test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm
        run: npm i -g npm@9.9.4

      - name: Install dependencies (clean)
        run: |
          npm --version
          node --version
          npm ci --workspaces=false --legacy-peer-deps --include=dev --no-audit --no-fund
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.prod .

      - name: Build backend image
        run: docker build -f backend/Dockerfile.prod backend
