name: production-build-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Pin npm
        run: npm i -g npm@9.9.4

      - name: Prepare isolated frontend workspace
        run: |
          rm -rf /tmp/admipaedia-frontend
          mkdir -p /tmp/admipaedia-frontend
          rsync -a --delete ./frontend/ /tmp/admipaedia-frontend/

      - name: Install dependencies (clean)
        working-directory: /tmp/admipaedia-frontend
        run: |
          npm --version
          node --version
          npm ci --legacy-peer-deps --include=dev --no-audit --no-fund

      - name: Build
        working-directory: /tmp/admipaedia-frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile.prod frontend

      - name: Build backend image
        run: docker build -f backend/Dockerfile.prod backend
