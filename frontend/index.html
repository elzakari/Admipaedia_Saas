<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/images/Admipaedia_Logo.png" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="ADMIPAEDIA - School Management System"
    />
    <link rel="apple-touch-icon" href="/assets/images/Admipaedia_Logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>ADMIPAEDIA - School Management System</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      (function () {
        var host = window.location.hostname;
        var isDevHost = host === 'localhost' || host === '127.0.0.1' || host === '[::1]';
        if (!isDevHost) return;
        if (!('serviceWorker' in navigator)) return;
        var guard = 'sw_cleanup=1';
        if (window.location.search && window.location.search.indexOf(guard) !== -1) return;

        navigator.serviceWorker
          .getRegistrations()
          .then(function (regs) {
            if (!regs || regs.length === 0) return;
            return Promise.all(
              regs.map(function (r) {
                return r.unregister();
              })
            )
              .then(function () {
                if (!('caches' in window)) return;
                return caches.keys().then(function (keys) {
                  return Promise.all(
                    keys.map(function (k) {
                      return caches.delete(k);
                    })
                  );
                });
              })
              .then(function () {
                var sep = window.location.search ? '&' : '?';
                window.location.replace(
                  window.location.pathname +
                    window.location.search +
                    sep +
                    guard +
                    window.location.hash
                );
              });
          })
          .catch(function () {});
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
