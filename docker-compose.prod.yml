version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend-api
      - backend-socket
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - admipaedia-network

  # Backend API Service
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "4", "--worker-class", "gthread", "--threads", "4", "--timeout", "120", "--keepalive", "2", "--max-requests", "1000", "--max-requests-jitter", "100", "wsgi_api:app"]
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://admipaedia:${DB_PASSWORD}@postgres:5432/admipaedia
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SOCKETIO_ASYNC_MODE=disabled
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - admipaedia-network

  # Backend Socket.IO Service
  backend-socket:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "1", "--worker-class", "eventlet", "--timeout", "120", "--keepalive", "2", "socket_server:app"]
    depends_on:
      - postgres
      - redis
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://admipaedia:${DB_PASSWORD}@postgres:5432/admipaedia
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SOCKETIO_ASYNC_MODE=eventlet
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 5000))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - admipaedia-network

  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    environment:
      - POSTGRES_DB=admipaedia
      - POSTGRES_USER=admipaedia
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - admipaedia-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - admipaedia-network

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
    restart: unless-stopped
    networks:
      - admipaedia-network

volumes:
  postgres_data:
  redis_data:

networks:
  admipaedia-network:
    driver: bridge